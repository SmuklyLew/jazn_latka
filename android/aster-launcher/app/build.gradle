plugins {
    id 'com.android.application'
}

android {
    namespace 'pl.smuklylew.asterlauncher'
    compileSdk 35

    defaultConfig {
        applicationId 'pl.smuklylew.asterlauncher'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
