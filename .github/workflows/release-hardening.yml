name: release-hardening

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: release-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-startup-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Apply verified startup patch when staged
        shell: bash
        run: |
          if [[ ! -f .github/startup_patch_parts/APPLY ]]; then
            echo "No staged startup patch; continuing to verification."
            exit 0
          fi

          cat .github/startup_patch_parts/part-* > /tmp/startup-v15034.patch
          echo "37314fac8700a2741d46183c6dbc19a778c13fefa540706bb90ac41a2941ef52  /tmp/startup-v15034.patch" | sha256sum --check --strict
          git apply --check \
            --exclude=latka_jazn/version.py \
            --exclude=.github/workflows/release-hardening.yml \
            /tmp/startup-v15034.patch
          git apply \
            --exclude=latka_jazn/version.py \
            --exclude=.github/workflows/release-hardening.yml \
            /tmp/startup-v15034.patch

          git show cd236d40a098fd0d8435dc66e097b254adeb0815:.github/workflows/release-hardening.yml > .github/workflows/release-hardening.yml
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/release-hardening.yml')
          text = path.read_text(encoding='utf-8')
          old = 'python -X utf8 run.py package-smoke --profile system --json'
          new = 'python -X utf8 main.py --package-smoke --package-profile system'
          if old not in text:
              raise SystemExit('expected package-smoke command not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          rm -rf .github/startup_patch_parts
          rm -f .github/workflows/apply-startup-v15034-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Unify startup routing and replace LM Studio with Ollama"
          git push origin HEAD:"${GITHUB_REF_NAME}"

  verify:
    needs: apply-startup-patch
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Compile all active Python
        run: python -X utf8 -m compileall -q latka_jazn tests main.py run.py

      - name: Test without live/private integrations
        run: >-
          python -X utf8 -m pytest
          -q -ra --tb=short --durations=25
          -m "not live_model and not live_mcp"

      - name: Package smoke system profile
        run: python -X utf8 main.py --package-smoke --package-profile system

      - name: Security path regressions
        run: python -X utf8 -m pytest -q tests/test_release_hardening_safe_paths.py tests/test_release_hardening_raw_archive.py

      - name: Full session integrity regressions
        run: python -X utf8 -m pytest -q tests/test_release_hardening_integrity_pipeline.py

      - name: Turn atomicity and timeout regressions
        run: >-
          python -X utf8 -m pytest -q
          tests/test_v15033_turn_atomicity.py
          tests/test_runtime_stability_daemon_status.py

      - name: Active contract legacy guard
        run: python -X utf8 -m pytest -q tests/test_release_hardening_active_contracts.py

      - name: Diff whitespace and generated-file guard
        if: always()
        run: |
          git diff --check
          git diff --exit-code
