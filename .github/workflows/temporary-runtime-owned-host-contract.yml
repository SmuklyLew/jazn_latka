name: temporary-runtime-owned-host-contract

on:
  push:
    branches:
      - fix/runtime-owned-host-contract-completion

permissions:
  contents: write

concurrency:
  group: temporary-runtime-owned-host-contract
  cancel-in-progress: false

jobs:
  migrate-test-and-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout completion branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: fix/runtime-owned-host-contract-completion

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Apply runtime-owned host contract
        run: python -X utf8 tools/maintenance/apply_runtime_owned_host_contract.py

      - name: Compile changed Python
        run: |
          python -X utf8 -m py_compile \
            latka_jazn/core/chat_command_contract.py \
            latka_jazn/core/runtime_ownership_contract.py \
            latka_jazn/core/handlers/identity_runtime_truth_handler.py \
            latka_jazn/core/handlers/direct_latka_voice_handler.py \
            tests/test_runtime_owned_agent_boundaries.py

      - name: Run targeted ownership tests
        run: |
          python -X utf8 -m pytest -q \
            tests/test_runtime_owned_agent_boundaries.py \
            tests/test_v15033_turn_atomicity.py::test_health_presence_phrases_are_detected_before_expensive_cognitive_work

      - name: Remove one-shot maintenance files and commit
        shell: bash
        run: |
          git rm \
            .github/workflows/temporary-runtime-owned-host-contract.yml \
            tools/maintenance/apply_runtime_owned_host_contract.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            latka_jazn/core/chat_command_contract.py \
            latka_jazn/core/handlers/identity_runtime_truth_handler.py \
            latka_jazn/core/handlers/direct_latka_voice_handler.py \
            tests/test_runtime_owned_agent_boundaries.py
          git diff --cached --check
          git commit -m 'feat(runtime): export runtime-owned host generation contract'
          git push origin HEAD:fix/runtime-owned-host-contract-completion
