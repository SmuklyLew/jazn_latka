name: Build Aster Launcher APK

on:
  push:
    branches:
      - aster-launcher-v0.1
    paths:
      - 'android/aster-launcher/**'
      - '.github/workflows/aster-launcher-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/aster-launcher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Prepare installation file
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/Aster-Launcher-v0.1.0.apk
          sha256sum dist/Aster-Launcher-v0.1.0.apk > dist/Aster-Launcher-v0.1.0.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aster-Launcher-APK
          path: |
            android/aster-launcher/dist/Aster-Launcher-v0.1.0.apk
            android/aster-launcher/dist/Aster-Launcher-v0.1.0.apk.sha256
          if-no-files-found: error
          retention-days: 30
