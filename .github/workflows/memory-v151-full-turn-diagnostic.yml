name: memory-v151-full-turn-diagnostic

on:
  push:
    branches:
      - update/v15.1.0.1
  pull_request:
    branches:
      - master
    paths:
      - "latka_jazn/memory/**"
      - "latka_jazn/core/runtime_session.py"
      - "tests/test_v15101_runtime_full_turn.py"
      - ".github/workflows/memory-v151-full-turn-diagnostic.yml"

permissions:
  contents: read

concurrency:
  group: memory-v151-full-turn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Run full-turn integration test and capture diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python -X utf8 -m pytest `
            tests/test_v15101_runtime_full_turn.py `
            -vv -s --tb=long `
            --junitxml=pytest-full-turn.xml `
            2>&1 | Tee-Object -FilePath pytest-output.txt
          $exitCode = $LASTEXITCODE
          "PYTEST_EXIT_CODE=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not (Test-Path pytest-error.txt)) {
            New-Item -ItemType File -Path pytest-error.txt | Out-Null
          }
          exit 0
      - name: Upload full-turn diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: memory-v151-full-turn-${{ matrix.os }}
          path: |
            pytest-output.txt
            pytest-error.txt
            pytest-full-turn.xml
          if-no-files-found: error
          retention-days: 7
      - name: Preserve pytest result
        shell: pwsh
        run: |
          if ([int]$env:PYTEST_EXIT_CODE -ne 0) {
            throw "full-turn pytest failed with exit code $env:PYTEST_EXIT_CODE; see artifact"
          }
