name: pr15-diagnostic

on:
  push:
    branches:
      - update/v15.1.0.1
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pr15-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Run full pytest and capture output
        id: pytest
        shell: bash
        run: |
          set +e
          python -X utf8 -m pytest -q -m "not live_model and not live_mcp" > pr15-pytest.txt 2>&1
          code=$?
          cat pr15-pytest.txt
          printf '%s\n' "$code" > pr15-exit-code.txt
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr15-pytest-diagnostics
          path: |
            pr15-pytest.txt
            pr15-exit-code.txt
          retention-days: 7
      - name: Preserve pytest result
        if: always()
        shell: bash
        run: exit "${{ steps.pytest.outputs.code }}"
