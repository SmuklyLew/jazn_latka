name: Inspect v15.1.0.3.89 migration patch

on:
  push:
    branches:
      - automation/v15.1.0.3.89-migration-runner
    paths:
      - '.github/workflows/inspect-v15100389-migration-bundle.yml'
  pull_request:
    branches:
      - update/v15.1.0.3.89-current-line-archive
    paths:
      - '.github/workflows/inspect-v15100389-migration-bundle.yml'
      - '.automation/v15.1.0.3.89/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/v15.1.0.3.89-migration-runner

      - name: Reconstruct and verify compressed patch
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.automation/v15.1.0.3.89/patch/part-*.b64)
          printf 'patch_parts=%s\n' "${#parts[@]}"
          test "${#parts[@]}" -eq 2
          cat "${parts[@]}" | tr -d '\r\n' | base64 --decode > migration.patch.xz
          actual_sha="$(sha256sum migration.patch.xz | awk '{print $1}')"
          echo "patch_xz_sha256=$actual_sha"
          test "$actual_sha" = 'f3f18f246af22c63a8cd91dc11f1e85b297d65929dbc1b786b65d925352fcae6'
          xz --test migration.patch.xz
          xz --decompress --stdout migration.patch.xz > migration.patch
          echo "patch_bytes=$(wc -c < migration.patch)"
          echo "patch_sha256=$(sha256sum migration.patch | awk '{print $1}')"
          git apply --numstat migration.patch | tail -n 20

      - name: Check patch against current update branch without writing
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin update/v15.1.0.3.89-current-line-archive master
          git worktree add --detach ../migration-check origin/update/v15.1.0.3.89-current-line-archive
          cp migration.patch ../migration-check/migration.patch
          cd ../migration-check
          echo "base_commit=$(git rev-parse HEAD)"
          echo "base_tree=$(git rev-parse HEAD^{tree})"
          git apply --check migration.patch
          echo direct_apply_check=passed
          git apply --3way --check migration.patch
          echo three_way_apply_check=passed
          git status --short
