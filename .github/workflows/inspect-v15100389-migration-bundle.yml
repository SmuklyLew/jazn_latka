name: Export current master for v15.1.0.3.89 migration

on:
  pull_request:
    branches:
      - update/v15.1.0.3.89-current-line-archive
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-master:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
      - name: Verify exact source commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "2e244d4a245440447102cca2ed3c7f947c8fd5c2"
          git status --short --branch
      - name: Build source snapshot
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=zip --output="$RUNNER_TEMP/jazn-master-2e244d4.zip" HEAD
          sha256sum "$RUNNER_TEMP/jazn-master-2e244d4.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: jazn-master-2e244d4-source
          path: ${{ runner.temp }}/jazn-master-2e244d4.zip
          if-no-files-found: error
          retention-days: 1
