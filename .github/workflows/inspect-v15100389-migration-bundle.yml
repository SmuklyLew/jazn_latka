name: Inspect v15.1.0.3.89 raw migration candidates

on:
  pull_request:
    branches:
      - update/v15.1.0.3.89-current-line-archive
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download, decode and verify candidates
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          ref="automation/v15.1.0.3.89-migration-runner"
          found=0
          for name in candidate-8acc.bin candidate-e223.bin; do
            echo "=== $name ==="
            url="https://raw.githubusercontent.com/$repo/$ref/.automation/v15.1.0.3.89/raw/$name"
            curl --fail --silent --show-error --location \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url" -o "$name"
            for level in 0 1 2; do
              current="$name.layer$level"
              if [ "$level" -eq 0 ]; then cp "$name" "$current"; fi
              [ -f "$current" ] || break
              printf 'layer=%s bytes=' "$level"; wc -c < "$current"
              printf 'sha256='; sha256sum "$current" | cut -d' ' -f1
              printf 'type='; file -b "$current"
              if git bundle verify "$current" >/dev/null 2>&1; then
                echo "RESULT=VALID_BUNDLE candidate=$name layer=$level"
                found=1
                break
              fi
              if xz -t "$current" >/dev/null 2>&1; then
                xz -dc "$current" > "$name.bundle"
                git bundle verify "$name.bundle"
                echo "RESULT=VALID_XZ_BUNDLE candidate=$name layer=$level"
                found=1
                break
              fi
              next="$name.layer$((level + 1))"
              base64 --decode "$current" > "$next" 2>/dev/null || { rm -f "$next"; break; }
            done
          done
          [ "$found" -eq 1 ] || { echo "RESULT=NO_VALID_BUNDLE"; exit 1; }
