name: memory-import-windows-diagnostic

on:
  push:
    branches:
      - tools/memory-import-to-db
  pull_request:
    branches:
      - master
    paths:
      - "latka_jazn/tools/chat_export_*.py"
      - "latka_jazn/tools/sqlite_archive_snapshot.py"
      - "tools/memory_import_*.py"
      - "tests/test_v15101_chat_export_*.py"
      - ".github/workflows/memory-import-windows-diagnostic.yml"

permissions:
  contents: read

concurrency:
  group: memory-import-windows-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Run full non-live pytest and capture diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python -X utf8 -m pytest `
            -q -ra --tb=long --durations=25 `
            --junitxml=pytest-windows.xml `
            -m "not live_model and not live_mcp" `
            2>&1 | Tee-Object -FilePath pytest-output.txt
          $exitCode = $LASTEXITCODE
          "PYTEST_EXIT_CODE=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not (Test-Path pytest-error.txt)) {
            New-Item -ItemType File -Path pytest-error.txt | Out-Null
          }
          exit 0
      - name: Upload complete pytest diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: memory-import-windows-pytest
          path: |
            pytest-output.txt
            pytest-error.txt
            pytest-windows.xml
          if-no-files-found: error
          retention-days: 7
      - name: Preserve pytest result
        shell: pwsh
        run: |
          if ([int]$env:PYTEST_EXIT_CODE -ne 0) {
            throw "pytest failed with exit code $env:PYTEST_EXIT_CODE; see uploaded diagnostic artifact"
          }
