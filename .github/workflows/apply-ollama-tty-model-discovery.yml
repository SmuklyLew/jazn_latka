name: apply-ollama-tty-model-discovery

on:
  push:
    branches:
      - fix/ollama-tty-model-discovery

permissions:
  contents: write

concurrency:
  group: apply-ollama-tty-model-discovery
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"
      PATCH_PATH: .github/patches/ollama-tty-model-discovery.patch
      PATCH_SHA256: 012062fd85d5b29c2d79f919ce527fd6d8e7cdc9f0cb54e9693178b3b87dd433
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: fix/ollama-tty-model-discovery

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Verify controlled patch
        shell: bash
        run: |
          actual_sha="$(sha256sum "$PATCH_PATH" | awk '{print $1}')"
          test "$actual_sha" = "$PATCH_SHA256"
          git apply --check "$PATCH_PATH"

      - name: Apply source repair
        shell: bash
        run: |
          git apply "$PATCH_PATH"
          rm -f "$PATCH_PATH" .github/workflows/apply-ollama-tty-model-discovery.yml

      - name: Install test dependencies
        run: python -X utf8 -m pip install --disable-pip-version-check -r requirements.txt pytest==9.0.2

      - name: Validate repaired CLI
        shell: bash
        run: |
          python -X utf8 -m compileall -q latka_jazn tests main.py run.py
          python -X utf8 -m pytest -q \
            tests/test_ollama_only_hotfix.py \
            tests/test_ollama_probe_v151.py \
            tests/test_cli_progress_system.py \
            tests/test_v15034_startup_stability.py \
            tests/test_runtime_stability_daemon_status.py \
            tests/test_code_health_regressions.py
          git diff --check

      - name: Commit verified repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ollama): restore terminal chat and model discovery"
          git push origin HEAD:fix/ollama-tty-model-discovery
